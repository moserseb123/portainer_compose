# Docker Compose file for running paperless from the Docker Hub.
# This file contains everything paperless needs to run.
# Paperless supports amd64, arm and arm64 hardware.
#
# All compose files of paperless configure paperless in the following way:
#
# - Paperless is (re)started on system boot, if it was running before shutdown.
# - Docker volumes for storing data are managed by Docker.
# - Folders for importing and exporting files are created in the same directory
#   as this file and mounted to the correct folders inside the container.
# - Paperless listens on port 8010.
#
# In addition to that, this Docker Compose file adds the following optional
# configurations:
#
# - Instead of SQLite (default), PostgreSQL is used as the database server.
#
# To install and update paperless with this file, do the following:
#
# - Open portainer Stacks list and click 'Add stack'
# - Paste the contents of this file and assign a name, e.g. 'paperless'
# - Upload 'docker-compose.env' by clicking on 'Load variables from .env file'
# - Modify the environment variables as needed
# - Click 'Deploy the stack' and wait for it to be deployed
#
# For more extensive installation and update instructions, refer to the
# documentation.

services:
  broker:
    image: docker.io/library/redis:8
    restart: unless-stopped
    networks:
      - paperless-internal
    volumes:
      - /etc/Cloud/PaperlessNgx/redis:/data

  db:
    image: docker.io/library/postgres:18
    restart: unless-stopped
    networks:
      - paperless-internal
    volumes:
      - /etc/Cloud/PaperlessNgx/db:/var/lib/postgresql
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: paperless

  webserver:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    restart: unless-stopped
    depends_on:
      - db
      - broker
    networks:
      - paperless-internal     # Private internal network (DB + Redis)
      - proxy                  # Public Traefik network
    volumes:
      # SSD (fast, small)
      - /etc/Cloud/PaperlessNgx/data:/usr/src/paperless/data
      # HDD (big storage)
      - /mnt/usb/PaperlessNgx/media:/usr/src/paperless/media
      - /mnt/usb/PaperlessNgx/export:/usr/src/paperless/export
      - /mnt/usb/PaperlessNgx/consume:/usr/src/paperless/consume
    environment:
      PAPERLESS_REDIS: redis://broker:6379
      PAPERLESS_DBHOST: db
    env_file:
      - stack.env
    labels:
      - "traefik.enable=true"

      # Router
      - "traefik.http.routers.paperless-router.rule=Host(`paperless.moser.ddnsfree.com`)"
      - "traefik.http.routers.paperless-router.entrypoints=websecure"
      - "traefik.http.routers.paperless-router.tls=true"
      - "traefik.http.routers.paperless-router.service=paperless-service"

      # Service
      - "traefik.http.services.paperless-service.loadbalancer.server.port=8000"
      
networks:
  proxy:
    external: true
  paperless-internal:
    driver: bridge

volumes:
  # Not used since mapped explicitly, but kept for Portainer compatibility
  data:
  media:
  pgdata:
  redisdata:
